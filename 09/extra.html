<!DOCTYPE html>
<html>
    <header>
        <title>Posicionamento</title>
        <meta charset="UTF-8" />
        <style type="text/css">
            body {
                background: lightblue;
                margin: 0px;
            }

            #conteudo{
                background: #FFFFFF;
                padding: 10px;
                width: 900px;
                margin: 30px auto;
            }
            .caixa {
                background: red;
                margin: 10px;
                width: 100px;
                height: 100px;
                color: #FFFFFF;
            }
            #header{
                position: header;
                left: 30px;
            }
            #left{
                position: left;
                left: 30px;
            }
            #center{
                position: center;
                left: 0px;
            }
        </style>
    </header>
    <body>
        <span>Container Body</span>
        <div id=conteudo>
            Container div
            <div id="header" class="caixa">
                <header></header>
            </div>
            <div id="left" class="caixa">
                left
            </div>
            <div id="center" class="caixa">
                center
            </div>
        </div>
    </body>
</html>

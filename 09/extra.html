<!DOCTYPE html>
<html>
<head>
    <title>Posicionamento</title>
    <meta charset="UTF-8" />

    <style>
        body{
            margin:0;
        }

        #header{
            text-align:center;
            background-color:lightblue;
            height:60px;
            line-height:60px;
        }

        #container{
            display:flex;
            height:500px;
        }

        #left{
            width:25%;
            background-color:lightcoral;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        #center{
            width:50%;
            background-color:lightgreen;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        #right{
            width:25%;
            background-color:lightcoral;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        #footer{
            background-color:lightpink;
            height:50px;
            line-height:50px;
            text-align:center;
        }
    </style>
</head>

<body>

    <div id="header">
        Header 100%
    </div>

    <div id="container">

        <div id="left">
            Left 25%
        </div>

        <div id="center">
            Center 50%
        </div>

        <div id="right">
            Right 25%
        </div>

    </div>

    <div id="footer">
        Footer 100%
    </div>

</body>
</html>

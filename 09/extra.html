<!DOCTYPE html>
<html>
    <header>
        <title>Posicionamento</title>
        <meta charset="UTF-8" />
        <style type="text/css">
            body {
                margin: 0px;
            }
            
            #conteudo{
                background: #FFFFFF;
                padding: 10px;
                width: 900px;
                margin: 30px auto;
            }
            .caixa {
                 height: 100px;
                 background-color: lightcoral;

            }
            
            #header{
                position: center;
                background-color: lightblue;
                height: 25px;
            }
            #left{
                position: left;
                left: 50px;
                
               
            }
            #center{
                position: center;
                left: 50px;
                background-color: lightgreen;
            }
            #right{
                position: right;
                right: 50px;
                background-color: lightcoral;
                
            }
            #footer{
                position: center;
                background-color: lightpink;
                text-align: center;
            }
            
        </style>
    </header>
    <body>
        
        <div id=conteudo>
            
            <div id="header">
                header 100%
            </div>
            <div id="left">
                left 25%
            </div>
            <div id="center">
                center 50%
            </div>
            <div id="right">
                right 25%
            </div>
            <div id="footer">
                footer 100%
            </div>
        </div>
    </body>
</html>

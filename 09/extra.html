<!DOCTYPE html>
<html>
    <header>
        <title>Posicionamento</title>
        <meta charset="UTF-8" />
        <style type="text/css">
            body {
                background: lightblue;
                margin: 0px;
            }

            #conteudo{
                background: #FFFFFF;
                padding: 10px;
                width: 900px;
                margin: 30px auto;
            }
            
            #center{
                position: center;
                left: 50px;
                background-color: lightgreen;
            }
            #left{
                position: left;
                left: 50px;
                background-color: lightcoral;
            }
            #right{
                position: right;
                right: 50px;
                background-color: lightcoral;
            }
            
            
        </style>
    </header>
    <body>
        <span>Container body</span>
        <div id=conteudo>
            Container div
            <div id="header" class="caixa">
                header 100%
            </div>
            <div id="left" class="caixa">
                left 25%
            </div>
            <div id="center" class="caixa">
                center 50%
            </div>
            <div id="right" class="caixa">
                right 25%
            </div>
            <div id="footer" class="caixa">
                footer 100%
            </div>
        </div>
    </body>
</html>

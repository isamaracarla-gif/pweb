<!DOCTYPE html>
<html>
    <head>
        <title>Posicionamento</title>
        <meta charset="UTF-8" />
        <style type="text/css">
            body {
                margin: 0px;
                padding: 0;
                box-sizing: border-box;
            }
            
            #conteudo{
                background: #FFFFFF;
                display: flex;
                height: 400px;
            }
            
            
            #header{
                position: center;
                background-color: lightblue;
                height: 100px;
                line-height: 60px;
            }
            #left{
               width: 25%;
               background-color: lightcoral;
               display: flex;
               justify-content: center;
               align-items: center;
               
            }
            #center{
               width: 25%;
               background-color: lightgreen;
               display: flex;
               justify-content: center;
               align-items: center;
            }
            #right{
                width: 25%;
                background-color: lightcoral;
                display: flex;
                justify-content: center;
                align-items: center;
                
            }
            #footer{
                background-color: lightpink;
                height: 50px;
                line-height: 50px;
                
            }
            
        </style>
    </head>
    <body>
         
        <div id=conteudo>
            
            <div id="header">
                header 100%
            </div>
            <div id="left">
                left 25%
            </div>
            <div id="center">
                center 50%
            </div>
            <div id="right">
                right 25%
            </div>
        
            <div id="footer">
                footer 100%
            </div>
        </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Posicionamento</title>
        <meta charset="UTF-8" />
        <style>
           
            body {
                margin: 0;
            }
            #container{
                
                display: flex;
                height: 400px;
            }
            
            
            #header{
                text-align: center;
                background-color: lightblue;
                height: 60px;
                line-height: 60px;
            }
            #left{
               width: 25%;
               background-color: lightcoral;
               display: flex;
               justify-content: center;
               align-items: center;
               
            }
            #center{
               width: 50%;
               background-color: lightgreen;
               display: flex;
               justify-content: center;
               align-items: center;
            }
            #right{
                width: 25%;
                background-color: lightcoral;
                display: flex;
                justify-content: center;
                align-items: center;
                
            }
            #footer{
                background-color: lightpink;
                height: 50px;
                line-height: 50px;
                text-align: center;
                
            }
            
        </style>
    </head>
    <body>
         <div id="header">
                header 100%
            </div>
        <div id=container>
            
            <div class="left">
                left 25%
            </div>
            <div class="center">
                center 50%
            </div>
            <div class="right">
                right 25%
            </div>
        
            <div class="footer">
                footer 100%
            </div>
        </div>
        </div>
    </body>
</html>

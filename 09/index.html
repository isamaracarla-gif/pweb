<!DOCTYPE html>
<html>
    <header>
        <title>Posicionamento</title>
        <a href="extra.html">Extra</a>
        <meta charset="UTF-8" />
        <style type="text/css">
            body {
                background: #61bd8c;
            }

            #conteudo{
                background: #FFFFFF;
                padding: 10px;
                width: 900px;
                margin: 30px auto;
            }
            .caixa {
                background: red;
                margin: 10px;
                width: 100px;
                height: 100px;
                color: #FFFFFF;
            }
            #relativo{
                position: relative;
                left: 30px;
            }
            #absoluto{
                position: absolute;
                left: 30px;
            }
            #fixo{
                position: fixed;
                left: 0px;
            }
        </style>
    </header>
    <body>
        <span>Container Body</span>
        <div id=conteudo>
            Container div
            <div id="relativo" class="caixa">
                Relativo
            </div>
            <div id="absoluto" class="caixa">
                Absoluto
            </div>
            <div id="fixo" class="caixa">
                Fixo
            </div>
        </div>
    </body>
</html>

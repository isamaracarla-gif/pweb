<!DOCTYPE html>
<head>
    <title>Fontes e Cores</title>
    <meta charset="utf-8" />
    <style type="text/css">
        .fonteSerif {
            font-family: "Times New Roman", Times, serif;
            font-size: 80px;
        }

        .fonteSans-Serif {
            font-family: "Verdana", Arial, Helvetica, sans-serif;
            font-size: 40px;
        }

        .fonteMonospace {
            font-family: "Courier New";
            font-size: 20px;
        }
    </style>
    <body>
        <p class="fonteSerif">Programação Web</p>
        <p class="fonteSans-Serif">Programação Web</p>
        <p class="fonteMonospace">Programação Web</p>
        
    </body>
</head>
